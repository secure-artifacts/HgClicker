name: Release Browser Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package Chrome extension
        run: |
          set -euo pipefail
          mkdir -p dist-chrome
          cp manifest.json background.js content.js icon16.png icon32.png icon48.png icon128.png dist-chrome/
          cp -R css js dist-chrome/
          cd dist-chrome
          zip -r "../hgclicker-${{ github.ref_name }}-chrome.zip" .

      - name: Package Firefox extension
        run: |
          set -euo pipefail
          mkdir -p dist-firefox
          cp manifest.firefox.json dist-firefox/manifest.json
          cp background.js content.js icon16.png icon32.png icon48.png icon128.png dist-firefox/
          cp -R css js dist-firefox/
          cd dist-firefox
          zip -r "../hgclicker-${{ github.ref_name }}-firefox.zip" .

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: '*.zip'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
